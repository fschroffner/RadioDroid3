name: RadioDroid Instrumented Tests CI

on:
  push:
    branches:
      - master
#  pull_request:
#    branches:
#      - master

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        # macos-latest runners are Apple Silicon (arm64), so emulators need
        # arm64-v8a system images. Google does not publish arm64-v8a images for
        # API 25-29, so the previous low target (27) could never boot. API 24
        # (default) and API 33 (google_apis) both have arm64-v8a images.
        api-level: [24, 33]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Restore Android virtual device
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: RadioDroid-${{ runner.os }}-avd-api${{ matrix.api-level }}

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Android virtual device if not cached
        uses: reactivecircus/android-emulator-runner@v2
        if: steps.avd-cache.outputs.cache-hit != 'true'
        with:
          api-level: ${{ matrix.api-level }}
          arch: arm64-v8a
          target: ${{ matrix.api-level >= 30 && 'google_apis' || 'default' }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run instrumented tests on Android virtual device
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: arm64-v8a
          target: ${{ matrix.api-level >= 30 && 'google_apis' || 'default' }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: /Users/runner/Library/Android/sdk/platform-tools/adb uninstall net.programmierecke.radiodroid2.test; ./gradlew ${{ matrix.api-level > 29 && 'installPlayDebugAndroidTest' || 'connectedCheck' }}
