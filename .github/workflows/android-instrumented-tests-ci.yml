name: RadioDroid Instrumented Tests CI

on:
  push:
    branches:
      - master
#  pull_request:
#    branches:
#      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # ubuntu-latest runners are x86_64 and provide KVM, so x86_64 system
        # images boot with hardware acceleration. This is the path GitHub
        # actively supports for the Android emulator, unlike the arm64 images
        # on the macOS runners which fail to boot reliably (nested
        # virtualization is not passed through to the emulator there).
        api-level: [24, 33]
    steps:
      - name: checkout
        uses: actions/checkout@v5

      # Give the emulator access to /dev/kvm on the runner.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Restore Android virtual device
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: RadioDroid-${{ runner.os }}-avd-api${{ matrix.api-level }}

      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Android virtual device if not cached
        uses: reactivecircus/android-emulator-runner@v2
        if: steps.avd-cache.outputs.cache-hit != 'true'
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: ${{ matrix.api-level >= 30 && 'google_apis' || 'default' }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run instrumented tests on Android virtual device
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: ${{ matrix.api-level >= 30 && 'google_apis' || 'default' }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: adb uninstall com.github.fschroffner.radiodroid3.test || true; ./gradlew ${{ matrix.api-level > 29 && 'installPlayDebugAndroidTest' || 'connectedCheck' }}
