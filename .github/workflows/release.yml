name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.86)'
        required: true
        default: 'v0.86'

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v5
    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: 17
    - name: Build APK
      run: bash ./gradlew assembleFreeDebug --stacktrace
    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        APK_PATH=$(find app/build/outputs/apk/free/debug -name "*.apk" | head -1)
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TAG="${{ inputs.tag_name }}"
        else
          TAG="${{ github.ref_name }}"
        fi
        gh release create "$TAG" "$APK_PATH" \
          --title "RadioDroid $TAG" \
          --generate-notes \
        || gh release upload "$TAG" "$APK_PATH" --clobber
